                <div class="post-info">

                <div class="post-content">
                    <p>7年的大学生活转瞬即逝，依依不舍的告别朝夕相处的同学和老师，人生的前24个年头都没有出过远门，工作却来到了深圳，改革开放的前沿阵地。11号就要入职了，现在心里还是揣着不安，对自己没有足够的信心，怀疑自己能否适应新的环境，新的生活和新的节奏。无论如何，时间的车轮不会因此而停止向前，或许是时候背起行囊去感受未知，去奋斗，希望自己能够闯出一个美好明天💪。</p>
